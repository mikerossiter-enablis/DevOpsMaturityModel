<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adoption Graph</title>
  <!-- Using date-fns adapter, etc. -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
  <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #f7f7f7;
      font-family: sans-serif;
    }
    #controls {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      flex-wrap: wrap;
    }
    .ctrl-separator {
      width: 1px;
      height: 20px;
      background: #e0e0e0;
      margin: 0 4px;
    }
    #controls span {
      font-size: 0.8em;
      color: #888;
      margin-left: auto;
    }
    .ctrl-btn {
      padding: 4px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: 0.85em;
      color: #333;
    }
    .ctrl-btn:hover {
      background: #f0f0f0;
    }
    .ctrl-btn.active {
      background: #4682b4;
      color: #fff;
      border-color: #4682b4;
    }
    #graph-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: calc(100vh - 45px);
    }
    #adoption-graph {
      width: 100%;
      height: 100%;
    }
    .no-state-message {
      font-size: 1.5em;
      color: #555;
    }
  </style>
</head>
<body>
  <div id="controls">
    <button class="ctrl-btn" id="btn-7d">7 days</button>
    <button class="ctrl-btn" id="btn-30d">30 days</button>
    <button class="ctrl-btn" id="btn-90d">90 days</button>
    <button class="ctrl-btn active" id="btn-all">All time</button>
    <button class="ctrl-btn" id="btn-reset" style="margin-left:8px;">Reset zoom</button>
    <span>Drag on chart to zoom &nbsp;|&nbsp; Ctrl+scroll to zoom</span>
  </div>
  <div id="graph-container">
    <canvas id="adoption-graph"></canvas>
  </div>
  <script src="graph.js"></script>
</body>
</html>
